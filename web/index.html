<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ReAct Agent Runtime</title>
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <div class="page">
      <header class="topbar">
        <div>
          <div class="eyebrow">LangGraph ReAct</div>
          <h1>Agent Runtime</h1>
          <p class="sub">Web search + persistence + thread control.</p>
        </div>
      </header>

      <div class="layout">
        <aside class="sidebar">
          <div class="sidebar-header">
            <div>
              <div class="eyebrow">Sessions</div>
              <div class="sidebar-sub">Pick a conversation</div>
            </div>
            <button id="newThread" class="btn ghost">New</button>
          </div>
          <div id="threadList" class="thread-list"></div>
        </aside>

        <div
          id="sidebarResize"
          class="sidebar-resize"
          role="separator"
          aria-orientation="vertical"
          aria-label="Resize sessions sidebar"
          tabindex="0"
        ></div>

        <main class="chat">
          <div id="messages" class="messages"></div>
          <div class="composer">
            <textarea id="messageInput" rows="2" placeholder="Ask the agent..." ></textarea>
            <button id="sendBtn" class="btn primary">Send</button>
          </div>
        </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/dompurify@3.1.7/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked@12.0.2/marked.min.js"></script>
    <script src="/static/app.js"></script>
  </body>
</html>
